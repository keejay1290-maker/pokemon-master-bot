services:
  - type: web
    name: pokemon-master-bot
    env: node
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_PUBLIC_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pokemon-master-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pokemon-master-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: POKEMON_TCG_API_KEY
        sync: false
      - key: DASHBOARD_SECRET
        generateValue: true

databases:
  - name: pokemon-master-db
    databaseName: pokemon_master
    user: pokemon

  - name: pokemon-master-redis
    plan: free
